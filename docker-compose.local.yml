services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      STORAGE_BACKEND: sqlite
      DATABASE_URL: sqlite:////app/data/accounts.db
    # Storage backend config (options: json, sqlite, postgres, git)
    # environment:
    #   STORAGE_BACKEND: json

    # Database config (used when STORAGE_BACKEND=sqlite/postgres)
    #   DATABASE_URL: postgresql://user:password@host:5432/dbname
    #   DATABASE_URL: sqlite:////app/data/accounts.db

    # Git repository config (used when STORAGE_BACKEND=git)
    #   GIT_REPO_URL: https://github.com/user/repo.git
    #   GIT_TOKEN: ghp_xxxxxxxxxxxx
    #   GIT_BRANCH: main
    #   GIT_FILE_PATH: accounts.json

    # Auth key (optional, overrides config.json)
    #   CHATGPT2API_AUTH_KEY: your_secret_key

    # Base URL (optional)
    #   CHATGPT2API_BASE_URL: https://your-domain.com
