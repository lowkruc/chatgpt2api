services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local-smoke
    ports:
      - "8001:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      STORAGE_BACKEND: sqlite
      DATABASE_URL: sqlite:////app/data/accounts.db
